<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>8A Scheduler</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">

<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script>window.React||document.write('<script src="https://unpkg.com/react@18/umd/react.production.min.js"><\/script>')</script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script>window.ReactDOM||document.write('<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"><\/script>')</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}
:root{
  --bg:#f4f7fb;
  --panel:#fff;
  --sidebar:#0f172a;
  --sidebar-soft:#1e293b;
  --primary:#2563eb;
  --text:#172033;
  --muted:#64748b;
  --border:#dbe3ef;
  --good-bg:#dcfce7;
  --good:#166534;
  --bad-bg:#fee2e2;
  --bad:#991b1b;
  --warn-bg:#fef3c7;
  --warn:#92400e;
}
body{
  font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
}
input, select, textarea{
  font-family:inherit;
  padding:9px 10px;
  border:1px solid var(--border);
  border-radius:10px;
  background:#fff;
  color:var(--text);
  outline:none;
  width:100%;
}
textarea{
  resize:vertical;
  min-height:78px;
}
input:focus, select:focus, textarea:focus{
  border-color:#93c5fd;
  box-shadow:0 0 0 3px rgba(37,99,235,.10);
}
button{
  font-family:inherit;
  padding:8px 12px;
  border:1px solid var(--border);
  border-radius:10px;
  background:#f8fafc;
  color:var(--text);
  cursor:pointer;
}
button:hover{
  filter:brightness(.98);
}
.app-shell{
  display:flex;
  min-height:100vh;
}
.sidebar{
  width:260px;
  background:var(--sidebar);
  color:#fff;
  padding:18px 14px;
  position:fixed;
  inset:0 auto 0 0;
  z-index:20;
  overflow:hidden;
  will-change:width;
}
.sidebar.collapsed{
  width:78px;
  box-shadow:8px 0 24px rgba(15,23,42,.08);
}
.brand{
  display:flex;
  align-items:center;
  margin-bottom:26px;
}
.hamburger{
  width:42px;
  height:42px;
  border:0;
  border-radius:14px;
  background:var(--sidebar-soft);
  color:#fff;
  font-size:22px;
  place-items:center;
  flex:0 0 42px;
}
.hamburger:hover{
  box-shadow:0 8px 18px rgba(0,0,0,.14);
  filter:none;
}
.hamburger:active{
  filter:brightness(.92);
}
.brand-text{
  white-space:nowrap;
}
.nav-text{
  white-space:nowrap;
  overflow:hidden;
}
.sidebar.collapsed .sidebar-footer{
  pointer-events:none;
}
.sidebar.collapsed .hamburger:active{
  filter:brightness(.92);
}
.nav{
  display:grid;
  gap:8px;
}
.nav button{
  border:0;
  width:100%;
  display:flex;
  align-items:center;
  border-radius:16px;
  background:transparent;
  color:#cbd5e1;
  text-align:left;
}
.nav button:hover{
  background:rgba(37,99,235,.82);
  color:#fff;
  filter:none;
  transform:translateX(2px);
}
.nav button.active{
  background:var(--primary);
  color:#fff;
  box-shadow:0 12px 28px rgba(37,99,235,.22);
}
.sidebar.collapsed .nav button:hover{
  transform:none;
}
.icon{
  text-align:center;
  font-size:18px;
}
.sidebar-footer{
  position:absolute;
  left:14px;
  right:14px;
  bottom:16px;
  color:#94a3b8;
  font-size:12px;
  line-height:1.45;
  padding:12px;
  border-radius:16px;
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(12px);
}
.main{
  margin-left:260px;
  width:calc(100% - 260px);
  padding:28px;
}
.sidebar.collapsed + .main{
  margin-left:78px;
  width:calc(100% - 78px);
}
@media (prefers-reduced-motion:reduce){
  .sidebar, .brand, .hamburger, .brand-text, .nav-text, .sidebar-footer, .nav button, .icon, .main{
    transition:none !important;
  }
}
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  margin-bottom:22px;
}
.page-title h1{
  margin-bottom:6px;
  line-height:1.1;
}
.page-title p{
  color:var(--muted);
}
.profile{
  background:#fff;
  border-radius:999px;
  padding:8px 14px;
  box-shadow:0 10px 30px rgba(15,23,42,.08);
  color:#334155;
  white-space:nowrap;
}
.stats{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
}
.stat-card{
  background:#fff;
}
.content-card{
  background:#fff;
  border-radius:22px;
  box-shadow:0 12px 30px rgba(15,23,42,.08);
}
.content-card{
  padding:22px 22px 22px 22px;
  overflow:auto;
}
.toolbar{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
  margin-bottom:14px;
}
.toolbar .spacer{
  flex:1;
}
.muted{
  color:var(--muted);
}
.danger{
  color:var(--bad);
}
.success{
  color:var(--good);
}
.grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.grid-3{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}
.grid-4{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}
.list{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.item{
  background:#fff;
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px 14px;
  display:flex;
  align-items:center;
  gap:12px;
}
.item-main{
  flex:1;
  min-width:0;
}
.item-title{
  font-weight:700;
}
.item-sub{
  color:var(--muted);
  margin-top:3px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.item-actions{
  display:flex;
  gap:6px;
  align-items:center;
  flex-shrink:0;
}
.icon-btn{
  width:34px;
  height:34px;
  display:inline-grid;
  place-items:center;
  border:0;
  background:transparent;
  border-radius:10px;
  font-size:17px;
  line-height:1;
  padding:0;
}
.icon-btn:hover{
  background:#f1efe8;
}
.icon-btn.danger{
  color:#a32d2d;
}
.icon-btn.danger:hover{
  background:#fcebeb;
}
.teacher-staircase{
  position:relative;
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:10px 0 0px 0px;
}
.teacher-staircase:before{
  position:absolute;
  top:18px;
  bottom:18px;
  width:4px;
  border-radius:999px;
  background:linear-gradient(180deg,#dbeafe,#bfdbfe,#e0e7ff);
}
.teacher-step{
  position:relative;
  margin-left:0;
  background:linear-gradient(135deg,#ffffff 0%,#fbfdff 64%,#eff6ff 100%);
  border:1px solid #dbeafe;
  border-radius:18px;
  padding:13px 14px 13px 58px;
  display:flex;
  align-items:center;
  gap:12px;
  box-shadow:0 10px 20px rgba(15,23,42,.07);
  user-select:none;
  touch-action:pan-y;
  transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease,background .16s ease;
}
.teacher-step:before{
  content:"";
  position:absolute;
  left:27px;
  top:50%;
  width:18px;
  height:4px;
  border-radius:999px;
  background:#bfdbfe;
  transform:translateY(-50%);
  display:none;
}
.teacher-rank{
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
  width:32px;
  height:32px;
  border-radius:11px;
  background:#2563eb;
  color:#fff;
  place-items:center;
  font-weight:900;
  font-size:12px;
  box-shadow:0 8px 18px rgba(37,99,235,.25);
}
.teacher-step[draggable="true"]{
  cursor:grab;
}
.teacher-step:hover{
  transform:translateY(-2px);
  box-shadow:0 16px 28px rgba(15,23,42,.11);
  border-color:#93c5fd;
}
.teacher-step.dragging{
  opacity:.72;
  transform:rotate(-1deg) scale(1.015);
  box-shadow:0 26px 50px rgba(15,23,42,.22);
  border-color:#2563eb;
  z-index:5;
}
.teacher-step.drag-over{
  background:#eff6ff;
  border-color:#2563eb;
  transform:translateY(4px);
}
.teacher-meta-row{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:6px;
}
.teacher-chip{
  padding:3px 7px;
  border-radius:999px;
  background:#f1f5f9;
  color:#475569;
  font-weight:700;
}
.reorder-hint{
  color:var(--muted);
  margin:-4px 0 10px 2px;
}
.class-staircase{
  position:relative;
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:10px 0 6px 10px;
}
.class-staircase:before{
  position:absolute;
  left:34px;
  top:18px;
  bottom:18px;
  width:4px;
  border-radius:999px;
  background:linear-gradient(180deg,#dbeafe,#bfdbfe,#e0e7ff);
}
.class-step{
  position:relative;
  margin-left:0;
  background:linear-gradient(135deg,#ffffff 0%,#fbfdff 64%,#eff6ff 100%);
  border:1px solid #dbeafe;
  border-radius:18px;
  padding:13px 14px 13px 58px;
  display:flex;
  align-items:center;
  gap:12px;
  box-shadow:0 10px 20px rgba(15,23,42,.07);
  transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease,background .16s ease;
}
.class-step:before{
  position:absolute;
  left:27px;
  top:50%;
  width:18px;
  height:4px;
  border-radius:999px;
  background:#bfdbfe;
  transform:translateY(-50%);
}
.class-dot{
  position:absolute;
  left:18px;
  top:50%;
  transform:translateY(-50%);
  width:18px;
  height:18px;
  border-radius:999px;
  background:#2563eb;
  box-shadow:0 8px 18px rgba(37,99,235,.25),inset 0 0 0 4px #dbeafe;
}
.class-step:hover{
  transform:translateY(-2px);
  box-shadow:0 16px 28px rgba(15,23,42,.11);
  border-color:#93c5fd;
  background:linear-gradient(135deg,#ffffff 0%,#fbfdff 55%,#dbeafe 100%);
}
.slot-staircase{
  position:relative;
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:10px 0 6px 18px;
}
.slot-staircase:before{
  position:absolute;
  left:34px;
  top:18px;
  bottom:18px;
  width:4px;
  border-radius:999px;
  background:linear-gradient(180deg,#dbeafe,#bfdbfe,#e0e7ff);
}
.slot-step{
  position:relative;
  background:linear-gradient(135deg,#ffffff 0%,#fbfdff 64%,#eff6ff 100%);
  border:1px solid #dbeafe;
  border-radius:18px;
  box-shadow:0 10px 20px rgba(15,23,42,.07);
  transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease,background .16s ease;
  overflow:hidden;
}
.slot-step:before{
  position:absolute;
  left:27px;
  top:27px;
  width:18px;
  height:4px;
  border-radius:999px;
  background:#bfdbfe;
  transform:translateY(-50%);
  z-index:1;
}
.slot-step:hover{
  transform:translateY(-2px);
  box-shadow:0 16px 28px rgba(15,23,42,.11);
  border-color:#93c5fd;
  background:linear-gradient(135deg,#ffffff 0%,#fbfdff 55%,#dbeafe 100%);
}
.slot-step.open{
  border-color:#93c5fd;
}
.slot-card-button{
  width:100%;
  border:0;
  border-radius:0;
  background:transparent;
  padding:13px 14px 13px 58px;
  display:flex;
  align-items:center;
  gap:12px;
  text-align:left;
  position:relative;
}
.slot-card-button:hover{
  filter:none;
}
.slot-card-button .teacher-rank{
  left:12px;
}
.slot-chevron{
  font-weight:900;
  color:#2563eb;
  font-size:18px;
  padding:0 2px;
}
.slot-details{
  border-top:1px solid #dbeafe;
  background:rgba(255,255,255,.72);
  padding:12px 14px 14px 58px;
  display:grid;
  gap:10px;
}
.slot-detail-title{
  font-size:12px;
  font-weight:900;
  color:#334155;
  margin-bottom:6px;
  text-transform:uppercase;
  letter-spacing:.03em;
}
.slot-day-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:8px;
}
.slot-day-card{
  border:1px solid #e6edf6;
  border-radius:14px;
  background:#fff;
  padding:10px;
}
.slot-day-title{
  font-size:12px;
  font-weight:900;
  color:#0c447c;
  margin-bottom:7px;
}
.slot-room-hint{
  font-size:12px;
  color:#64748b;
  font-weight:700;
}
.badge{
  padding:3px 8px;
  border-radius:999px;
  font-weight:700;
  display:inline-flex;
  align-items:center;
  gap:4px;
}
.b-blue{
  background:#e6f1fb;
  color:#0c447c;
}
.b-green{
  background:#eaf3de;
  color:#3b6d11;
}
.b-amber{
  background:#faeeda;
  color:#854f0b;
}
.b-red{
  background:#fcebeb;
  color:#a32d2d;
}
.b-gray{
  background:#f1f5f9;
  color:#475569;
}
.b-purple{
  background:#eeedfe;
  color:#3c3489;
}
.b-teal{
  background:#e1f5ee;
  color:#0f6e56;
}
.modal-bg{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
  z-index:1000;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;
}
.modal{
  background:#fff;
  width:100%;
  max-height:90vh;
  overflow:auto;
}
.modal-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.x{
  background:none;
  border:0;
  font-size:22px;
  padding:0 4px;
  color:var(--muted);
}
table{
  width:100%;
  border-collapse:collapse;
}
th, td{
  text-align:left;
  padding:10px;
  border-bottom:1px solid #eef2f7;
  font-size:13px;
}
th{
  background:#f8fafc;
  color:#475569;
  font-weight:800;
}
.empty{
  padding:26px;
  border:1px dashed var(--border);
  border-radius:16px;
  text-align:center;
  background:#f8fafc;
  color:var(--muted);
}
.mobile-nav{
  display:none;
  gap:6px;
  margin-bottom:16px;
  overflow:auto;
  padding-bottom:4px;
}
.mobile-nav button{
  white-space:nowrap;
  border:0;
  background:#e2e8f0;
  color:#334155;
}
.mobile-nav button.active{
  background:#2563eb;
  color:#fff;
}
@media (max-width:900px){
  .sidebar{
    width:78px;
  }
  .sidebar .brand-text, .sidebar .nav-text, .sidebar .sidebar-footer{
    display:none;
  }
  .main, .sidebar.collapsed+.main{
    margin-left:78px;
    width:calc(100% - 78px);
    padding:18px;
  }
  .stats, .grid-2, .grid-3, .grid-4{
    grid-template-columns:1fr;
  }
  .topbar{
    align-items:flex-start;
    flex-direction:column;
  }
  .mobile-nav{
    display:flex;
  }
  .content-card{
    padding:16px;
  }
}
.choice-panel{
  border:1px solid #e6edf6;
  border-radius:18px;
  background:#fbfdff;
  padding:14px;
  margin-top:8px;
}
.choice-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:10px;
}
.choice-title{
  font-weight:800;
  color:#334155;
}
.choice-summary{
  color:#64748b;
}
.pill-grid{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.choice-pill{
  border:1px solid #dbe3ef;
  background:#fff;
  border-radius:999px;
  padding:8px 12px;
  display:inline-flex;
  align-items:center;
  gap:7px;
  font-size:13px;
  font-weight:700;
  color:#475569;
  user-select:none;
}
.choice-pill input{
  display:none;
}
.choice-pill.active{
  background:#e6f1fb;
  border-color:#93c5e8;
  color:#0c447c;
  box-shadow:0 6px 18px rgba(37,99,235,.10);
}
.choice-pill .tick{
  width:18px;
  height:18px;
  border-radius:999px;
  border:1px solid #cbd5e1;
  display:inline-grid;
  place-items:center;
  font-size:12px;
  color:transparent;
  background:#fff;
}
.choice-pill.active .tick{
  background:#2563eb;
  border-color:#2563eb;
  color:#fff;
}
.mini-actions{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.mini-actions button{
  padding:5px 9px;
  border-radius:999px;
  font-size:12px;
}
.subject-groups{
  display:grid;
  gap:10px;
  margin-top:8px;
}
.subject-group{
  border:1px solid #e6edf6;
  border-radius:16px;
  background:#fff;
  overflow:hidden;
}
.subject-group-head{
  width:100%;
  border:0;
  border-radius:0;
  background:#f8fafc;
  padding:12px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  text-align:left;
  font-weight:800;
  color:#334155;
}
.subject-group-head:hover{
  background:#f1f5f9;
}
.subject-body{
  padding:12px 14px;
  border-top:1px solid #eef2f7;
}
.settings-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
}
.settings-field{
  border:1px solid #e6edf6;
}
.settings-field.full{
  grid-column:1/-1;
}
.settings-card-head{
  display:flex;
  justify-content:space-between;
  gap:12px;
}
.settings-help{
  font-size:12px;
  color:#64748b;
  margin-top:3px;
  line-height:1.4;
}
.settings-count{
  border-radius:999px;
  white-space:nowrap;
}
.settings-add{
  display:flex;
  gap:8px;
  margin-bottom:10px;
}
.settings-add input{
  height:38px;
}
.settings-list{
  display:flex;
  flex-direction:column;
  gap:7px;
}
.settings-row{
  display:flex;
  align-items:center;
  gap:8px;
  background:#fff;
  border:1px solid #e6edf6;
}
.settings-row input{
  border:0;
  background:transparent;
  box-shadow:none;
}
.settings-row input:focus{
  box-shadow:none;
  border:0;
  background:#f8fafc;
}
.settings-row button{
  width:30px;
  height:30px;
  padding:0;
  border:0;
  background:#f8fafc;
  flex:0 0 auto;
}
.settings-row button:hover{
  background:#e2e8f0;
}
.rooms-layout{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
}
.room-card{
  border:1px solid #e6edf6;
}
.room-add{
  display:flex;
  gap:7px;
  margin-bottom:8px;
}
.room-chip-list{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}
.room-chip{
  display:inline-flex;
  align-items:center;
  gap:6px;
  border:1px solid #c7d2fe;
  background:#eef2ff;
  border-radius:999px;
  padding:6px 8px;
  font-size:12px;
  font-weight:800;
  color:#3730a3;
}
.room-chip button{
  border:0;
  background:transparent;
  padding:0;
  width:16px;
  height:16px;
  line-height:1;
  color:#991b1b;
}
@media (max-width:900px){
  .settings-grid, .rooms-layout{
    grid-template-columns:1fr;
  }
}
.selected-chips{
  display:flex;
  flex-wrap:wrap;
}
.selected-chip{
  background:#eef2ff;
  color:#3730a3;
}
.compact-summary{
  color:var(--muted);
  padding:0 12px 12px 12px;
  line-height:1.45;
}
@media (max-width:620px){
  .sidebar{
    display:none;

ay:none}\n  .assign-popover.show{display:block}\n  .assign-title{font-size:13px;font-weight:650;color:#334155;margin-bottom:3px}\n  .assign-sub{font-size:12px;color:#64748b;margin-bottom:8px;font-weight:500}\n  .assign-row{display:grid;grid-template-columns:1fr auto auto;gap:6px;align-items:center}\n  .danger{color:#b91c1c}\n  .toast{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);background:#0f172a;color:#fff;border-radius:6px;padding:8px 11px;box-shadow:0 10px 26px rgba(15,23,42,.22);font-size:12.5px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .18s ease,transform .18s ease;z-index:120}\n  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}\n\n  .confirm-overlay{position:fixed;inset:0;z-index:130;display:none;align-items:center;justify-content:center;background:rgba(15,23,42,.28);backdrop-filter:blur(3px);padding:18px}\n  .confirm-overlay.show{display:flex}\n  .confirm-dialog{width:min(360px,100%);background:#fff;border:1px solid #d9e1ec;border-radius:14px;box-shadow:0 18px 46px rgba(15,23,42,.22);padding:18px;transform:translateY(6px);opacity:0;transition:transform .14s ease,opacity .14s ease}\n  .confirm-overlay.show .confirm-dialog{transform:translateY(0);opacity:1}\n  .confirm-title{font-size:15.5px;font-weight:650;color:#0f172a;letter-spacing:-.005em;line-height:1.25;margin-bottom:7px}\n  .confirm-text{font-size:13px;line-height:1.45;color:#64748b;font-weight:400;margin-bottom:16px}\n  .confirm-actions{display:flex;justify-content:flex-end;gap:8px}\n  .confirm-actions button{min-height:34px;border-radius:8px;padding:7px 12px;font-size:13px}\n  .confirm-cancel{background:#fff;color:#475569;border-color:#d8e0ec;font-weight:500}\n  .confirm-cancel:hover{background:#f8fafc;border-color:#cbd5e1}\n  .confirm-replace{background:#1a73e8;border-color:#1a73e8;color:#fff;font-weight:600;box-shadow:none}\n  .confirm-replace:hover{background:#1765cc;border-color:#1765cc}\n\n  /* Calendar border final: same radius as teacher search, one clean outer edge */\n  .calendar-wrap{\n    border:1px solid #d8e0ec;\n    border-radius:8px;\n    overflow:auto;\n    background:#fff;\n    box-shadow:0 1px 0 rgba(15,23,42,.02);transform:translateY(-5px);\n  }\n  .corner{border-top-left-radius:7px}\n  .day-head:nth-child(8){border-top-right-radius:7px}\n  .calendar-grid > :nth-child(8n){border-right:0!important}\n  .calendar-grid > :nth-last-child(-n+8){border-bottom:0!important}\n  .time-label:nth-last-child(8){border-bottom-left-radius:7px}\n  .slot-cell:last-child{border-bottom-right-radius:7px}\n  @media(max-width:740px){\n    body{padding:10px}.card{padding:10px}.topline{align-items:flex-start;flex-direction:column;gap:6px}.hint{margin-left:0;max-width:none}.calendar-grid{min-width:820px;grid-template-columns:58px repeat(7,108px)}:root{--time-col:58px;--row-h:22px}\n  }\n</style>\n</head>\n<body>\n  <main class=\"page\">\n    <section class=\"card\">\n      <div class=\"topline\">\n        <div class=\"title\">\n          <h1>Teacher Schedule</h1>\n        </div>\n      </div>\n\n      <div class=\"toolbar\">\n        <div class=\"field teacher-field\">\n          <label>Teacher</label>\n          <div class=\"teacher-combo\" id=\"teacherCombo\">\n            <span class=\"search-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"11\" cy=\"11\" r=\"7\"></circle><path d=\"M16.5 16.5L21 21\"></path></svg></span>\n            <input id=\"teacherSearch\" class=\"teacher-search\" type=\"search\" placeholder=\"Search teacher...\" autocomplete=\"off\" aria-label=\"Search teacher\" />\n            <div id=\"teacherMenu\" class=\"teacher-menu\" role=\"listbox\"></div>\n          </div>\n        </div>\n        <div class=\"field week-field\">\n          <label>Week</label>\n          <div class=\"week-btns\">\n            <div class=\"week-stepper\" aria-label=\"Week navigation\">\n              <button id=\"prevWeek\" class=\"icon-week-btn\" title=\"Previous week\" aria-label=\"Previous week\"><svg viewBox=\"0 0 24 24\" aria-hidden=\"true\"><path d=\"M15 6l-6 6 6 6\"/></svg></button>\n              <div id=\"weekDisplay\" class=\"week-display current\">This week</div>\n              <button id=\"nextWeek\" class=\"icon-week-btn\" title=\"Next week\" aria-label=\"Next week\"><svg viewBox=\"0 0 24 24\" aria-hidden=\"true\"><path d=\"M9 6l6 6-6 6\"/></svg></button>\n            </div>\n          </div>\n        </div>\n        <div class=\"hint\">Drag in one day column to mark availability. Availability blocks only show Available + time; classes/AHC keep centres.</div>\n      </div>\n\n      <div class=\"calendar-wrap\" id=\"calendarWrap\">\n        <div class=\"calendar-grid\" id=\"calendarGrid\"></div>\n      </div>\n      <div class=\"schedule-empty-state\" id=\"scheduleEmptyState\"></div>\n\n    </section>\n  </main>\n\n  <div class=\"assign-popover\" id=\"assignPopover\">\n    <div class=\"assign-title\">Assign this slot</div>\n    <div class=\"assign-sub\" id=\"assignSub\">Mon 17:00–19:00</div>\n    <div class=\"assign-row\">\n      <select id=\"assignCentre\">\n        <option>PMH</option>\n        <option>Gò Vấp</option>\n        <option>Sala</option>\n        <option>Bình Tân</option>\n        <option>Sunrise</option>\n        <option>Bình Thạnh</option>\n        <option>D10</option>\n      </select>\n      <button class=\"primary\" id=\"assignAdd\">Add</button>\n      <button id=\"assignCancel\">Cancel</button>\n    </div>\n  </div>\n\n  <div class=\"confirm-overlay\" id=\"replaceConfirm\" aria-hidden=\"true\">\n    <div class=\"confirm-dialog\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"replaceConfirmTitle\">\n      <div class=\"confirm-title\" id=\"replaceConfirmTitle\">Replace this week?</div>\n      <div class=\"confirm-text\">Applying previous will replace all current slots in this week.</div>\n      <div class=\"confirm-actions\">\n        <button class=\"confirm-cancel\" id=\"replaceCancel\">Cancel</button>\n        <button class=\"confirm-replace\" id=\"replaceConfirmBtn\">Replace</button>\n      </div>\n    </div>\n  </div>\n  <div class=\"toast\" id=\"toast\">Slot added</div>\n\n<script>\n  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];\n  const appDayToIndex = {Mon:0,Tue:1,Wed:2,Thu:3,Thur:3,Fri:4,Sat:5,Sun:6};\n  const startHour = 8;\n  const endHour = 21;\n  const slotMinutes = 30;\n  const slotsPerDay = (endHour - startHour) * 2;\n\n  const grid = document.getElementById('calendarGrid');\n  const calendarWrap = document.getElementById('calendarWrap');\n  const teacherSearch = document.getElementById('teacherSearch');\n  const teacherMenu = document.getElementById('teacherMenu');\n  const teacherCombo = document.getElementById('teacherCombo');\n  const scheduleEmptyState = document.getElementById('scheduleEmptyState');\n  const popover = document.getElementById('assignPopover');\n  const assignSub = document.getElementById('assignSub');\n  const assignCentre = document.getElementById('assignCentre');\n  const assignAdd = document.getElementById('assignAdd');\n  const assignCancel = document.getElementById('assignCancel');\n  const applyPrevWeekBtn = document.getElementById('applyPrevWeek');\n  const applyPrevWeekAllBtn = document.getElementById('applyPrevWeekAll');\n  const weekDisplay = document.getElementById('weekDisplay');\n  const toast = document.getElementById('toast');\n  const replaceConfirm = document.getElementById('replaceConfirm');\n  const replaceCancel = document.getElementById('replaceCancel');\n  const replaceConfirmBtn = document.getElementById('replaceConfirmBtn');\n  let pendingReplaceAction = null;\n  let pendingScheduleEdit = null;\n\n  let weekOffset = 0;\n  let schedules = {};\n  let fixedSchedules = {};\n  let assignedSchedules = {};\n  let teacherNames = [];\n  let teacherIdByName = {};\n  let teacherCentresByName = {};\n  let selectedTeacher = '';\n  let activeSuggestionIndex = 0;\n  let dragStart = null;\n  let dragCurrent = null;\n  let pendingSelection = null;\n  let pointerDown = false;\n  let resizeState = null;\n  let expandedAssignment30Id = null;\n\n  function cssVar(name){return getComputedStyle(document.documentElement).getPropertyValue(name).trim()}\n  function px(name){return parseFloat(cssVar(name))}\n  function slotCell(day,slot){return document.querySelector(`.slot-cell[data-day=\"${day}\"][data-slot=\"${slot}\"]`)}\n  function measuredRowHeight(){\n    const cell = document.querySelector('.slot-cell');\n    const h = cell ? cell.getBoundingClientRect().height : 0;\n    return h || px('--row-h') || 21;\n  }\n  function blockHeightFor(slot){\n    const first = slotCell(slot.day, slot.start);\n    const last = slotCell(slot.day, Math.max(slot.start, slot.end - 1));\n    const isExpandedAssignment30 = slot.assignment && (slot.end - slot.start) === 1 && expandedAssignment30Id === String(slot.id);\n    let base = 1;\n    if(first && last){\n      const a = first.getBoundingClientRect();\n      const b = last.getBoundingClientRect();\n      base = Math.max(1, b.bottom - a.top - 4);\n    }else{\n      base = Math.max(1, (slot.end - slot.start) * measuredRowHeight() - 4);\n    }\n    return `${isExpandedAssignment30 ? base * 2 + 4 : base}px`;\n  }\n  function selectionHeightFor(day,start,endExclusive){\n    const first = slotCell(day, start);\n    const last = slotCell(day, Math.max(start, endExclusive - 1));\n    if(first && last){\n      const a = first.getBoundingClientRect();\n      const b = last.getBoundingClientRect();\n      return `${Math.max(1, b.bottom - a.top - 4)}px`;\n    }\n    return `${Math.max(1,endExclusive-start) * measuredRowHeight() - 4}px`;\n  }\n  function pad(n){return String(n).padStart(2,'0')}\n  function minsToTime(mins){return `${pad(Math.floor(mins/60))}:${pad(mins%60)}`}\n  function slotToTime(slot){return minsToTime(startHour * 60 + slot * slotMinutes)}\n  function teacherKey(){return selectedTeacher}\n  function scheduleVersionKey(teacherName, fromWeek){return `${teacherName}_week_${Number(fromWeek) || 0}`}\n  function scheduleVersionFromKey(key){const m = String(key || '').match(/^(.*)_week_(-?\\d+)$/); return m ? Number(m[2]) || 0 : null}\n  function availableKeysForTeacher(teacherName){\n    return Object.keys(schedules || {}).filter(k=>k === `${teacherName}_all` || k.startsWith(`${teacherName}_week_`));\n  }\n  function normalizedScheduleKey(key, teacherName){\n    if(key === `${teacherName}_all`) return scheduleVersionKey(teacherName, 0);\n    return key;\n  }\n  function latestScheduleKeyForWeek(teacherName, wk){\n    const week = Number(wk) || 0;\n    const versions = availableKeysForTeacher(teacherName).map(k=>({key:k, normalized:normalizedScheduleKey(k, teacherName), from:k === `${teacherName}_all` ? 0 : scheduleVersionFromKey(k)})).filter(x=>x.from !== null && x.from <= week);\n    if(!versions.length) return scheduleVersionKey(teacherName, week);\n    versions.sort((a,b)=>b.from-a.from);\n    return versions[0].normalized;\n  }\n  function dbKey(){return latestScheduleKeyForWeek(teacherKey(), weekOffset)}\n  function baseSlotsForWeek(){\n    const key = latestScheduleKeyForWeek(teacherKey(), weekOffset);\n    schedules[key] = schedules[key] || [];\n    return schedules[key];\n  }\n  function editableSlots(){\n    const exactKey = scheduleVersionKey(teacherKey(), weekOffset);\n    if(!schedules[exactKey]){\n      const sourceKey = latestScheduleKeyForWeek(teacherKey(), weekOffset);\n      schedules[exactKey] = (schedules[sourceKey] || []).map(s=>({...s}));\n    }\n    return schedules[exactKey];\n  }\n  function currentSlots(){return baseSlotsForWeek()}\n  function fixedSlots(){return (fixedSchedules[teacherKey()] || []).filter(s => s.startWeekOffset == null || weekOffset >= s.startWeekOffset)}\n  function assignedSlots(){return assignedSchedules[`${teacherKey()}_week_${weekOffset}`] || []}\n  function splitSlotsByBlocksForDisplay(slots, blockers){\n    let visible = (slots || []).map(s=>({...s}));\n    (blockers || []).forEach(block=>{\n      const next = [];\n      visible.forEach(slot=>{\n        if(slot.day !== block.day || slot.end <= block.start || block.end <= slot.start){ next.push(slot); return; }\n        if(slot.start < block.start) next.push({...slot, id:`${slot.id}_pre_${block.id}`, end:block.start});\n        if(block.end < slot.end) next.push({...slot, id:`${slot.id}_post_${block.id}`, start:block.end});\n      });\n      visible = next;\n    });\n    return visible;\n  }\n  function currentDisplaySlots(){return splitSlotsByBlocksForDisplay(currentSlots(), [...fixedSlots(), ...assignedSlots()])}\n  function displaySlots(){return [...fixedSlots(), ...assignedSlots(), ...currentDisplaySlots()]}\n  function appDayName(dayIndex){return dayIndex === 3 ? 'Thur' : days[dayIndex]}\n  function collectFlexibility(){\n    const records = [];\n    Object.entries(schedules || {}).forEach(([key, slots])=>{\n      const allMatch = key.match(/^(.*)_all$/);\n      const weekMatch = key.match(/^(.*)_week_(-?\\d+)$/);\n      const teacherName = allMatch ? allMatch[1] : (weekMatch ? weekMatch[1] : '');\n      if(!teacherName) return;\n      const effectiveFromWeek = allMatch ? 0 : (Number(weekMatch[2]) || 0);\n      const teacherId = teacherIdByName[teacherName];\n      if(!teacherId) return;\n      (slots || []).forEach(slot=>{\n        if(slot.fixed || slot.assignment) return;\n        records.push({\n          id:String(slot.id),\n          teacherId,\n          teacherName,\n          allWeeks:true,\n          effectiveFromWeek,\n          weekOffset:null,\n          day:appDayName(slot.day),\n          timeFrom:slotToTime(slot.start),\n          timeTo:slotToTime(slot.end),\n          centre:''\n        });\n      });\n    });\n    return mergeFlexRecords(records);\n  }\n  function mergeFlexRecords(records){\n    const grouped = new Map();\n    (records || []).forEach(r=>{\n      const key = `${r.teacherId}|${r.day}|${Number(r.effectiveFromWeek) || 0}`;\n      const from = toMinsApp(r.timeFrom);\n      const to = toMinsApp(r.timeTo);\n      if(from == null || to == null || to <= from) return;\n      if(!grouped.has(key)) grouped.set(key, []);\n      grouped.get(key).push({...r, _from:from, _to:to});\n    });\n    const out = [];\n    grouped.forEach(items=>{\n      items.sort((a,b)=>a._from-b._from || a._to-b._to);\n      items.forEach(item=>{\n        const last = out[out.length - 1];\n        if(last && last.teacherId === item.teacherId && last.day === item.day && (Number(last.effectiveFromWeek) || 0) === (Number(item.effectiveFromWeek) || 0) && toMinsApp(last.timeTo) >= item._from){\n          if(item._to > toMinsApp(last.timeTo)) last.timeTo = item.timeTo;\n        }else{\n          const {_from,_to,...clean} = item;\n          out.push({...clean, id:`${clean.teacherId}_${clean.day}_${Number(clean.effectiveFromWeek) || 0}_${clean.timeFrom}_${clean.timeTo}`});\n        }\n      });\n    });\n    return out;\n  }\n  function saveFlexibility(){\n    try{\n      const teacherFlexibility = collectFlexibility();\n      localStorage.setItem('8a_scheduler_calendar_flex_backup', JSON.stringify(teacherFlexibility));\n      window.parent && window.parent.postMessage({type:'calendar-flexibility-update', teacherFlexibility}, '*');\n    }catch(err){\n      console.error('Could not save calendar flexibility', err);\n    }\n  }\n  function mondayOf(date){\n    const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());\n    const day = d.getDay() || 7;\n    d.setDate(d.getDate() - day + 1);\n    return d;\n  }\n  const baseWeekStart = mondayOf(new Date());\n  function dateForDay(dayIndex){\n    const d = new Date(baseWeekStart);\n    d.setDate(d.getDate() + weekOffset * 7 + dayIndex);\n    return d;\n  }\n  function formatShortDate(date){\n    return date.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}).replace(' ', ' ');\n  }\n  function w beginScheduleEditSnapshot();\n    const slots = editableSlots();\n    const index = slots.findIndex(s=>s.id == id || String(id).startsWith(String(s.id) + '_'));\n    if(index >= 0) slots.splice(index,1);\n    render();\n    showScheduleEditConfirm(scheduleEditSnapshot, 'Slot removed');\n  }\n\n  function deleteAssignmentSlot(slot){\n    if(!slot || !slot.assignment) return;\n    const key = `${teacherKey()}_week_${weekOffset}`;\n    assignedSchedules[key] = (assignedSchedules[key] || []).filter(s=>String(s.id) !== String(slot.id));\n    if(expandedAssignment30Id === String(slot.id)) expandedAssignment30Id = null;\n    render();\n    try{\n      window.parent && window.parent.postMessage({\n        type:'calendar-assignment-delete',\n        assignmentId:slot.assignmentDbId || '',\n        assignmentSlotId:slot.id || '',\n        sourceRequestId:slot.sourceRequestId || null,\n        sourceRequestIndex:Number.isInteger(slot.sourceRequestIndex) ? slot.sourceRequestIndex : null,\n        sourceRequestToken:slot.sourceRequestToken || null,\n        day:appDayName(slot.day),\n        weekOffset:Number(weekOffset) || 0,\n        teacherId:teacherIdByName[teacherKey()] || '',\n        timeFrom:slotToTime(slot.start),\n        timeTo:slotToTime(slot.end)\n      }, '*');\n    }catch(err){}\n    showToast('Assignment removed');\n  }\n\n  function normalizeOverlapsFor(slot){\n    const slots = editableSlots();\n    for(let i = slots.length - 1; i >= 0; i--){\n      const other = slots[i];\n      if(other.id !== slot.id && slotOverlaps(other, slot)) slots.splice(i,1);\n    }\n    slots.sort((a,b)=>a.day-b.day || a.start-b.start);\n  }\n\n  function buildGrid(){\n    grid.innerHTML = '';\n    const corner = document.createElement('div');\n    corner.className = 'corner';\n    grid.appendChild(corner);\n    days.forEach((d,i)=>{\n      const head = document.createElement('div');\n      head.className = 'day-head';\n      head.innerHTML = `<span class=\"day-name\">${d}</span><span class=\"day-date\">${formatShortDate(dateForDay(i))}</span>`;\n      grid.appendChild(head);\n    });\n    for(let slot=0; slot<slotsPerDay; slot++){\n      const label = document.createElement('div');\n      label.className = 'time-label';\n      label.textContent = slot % 2 === 0 ? slotToTime(slot) : '';\n      grid.appendChild(label);\n      for(let day=0; day<7; day++){\n        const cell = document.createElement('div');\n        cell.className = `slot-cell ${slot % 2 === 0 ? 'hour-line' : ''}`;\n        cell.dataset.day = day;\n        cell.dataset.slot = slot;\n        grid.appendChild(cell);\n      }\n    }\n  }\n  function clearSelection(){\n    document.querySelectorAll('.slot-cell.selecting,.slot-cell.pending,.slot-cell.resize-preview').forEach(c=>c.classList.remove('selecting','pending','resize-preview'));\n    document.querySelectorAll('.selection-ghost').forEach(g=>g.remove());\n  }\n  function drawSelectionGhost(day,start,endExclusive,cls='selection-ghost'){\n    const cell = slotCell(day,start);\n    if(!cell) return;\n    const ghost = document.createElement('div');\n    ghost.className = cls;\n    ghost.style.height = selectionHeightFor(day,start,endExclusive);\n    cell.appendChild(ghost);\n  }\n  function paintSelection(){\n    clearSelection();\n    if(!dragStart || !dragCurrent || dragStart.day !== dragCurrent.day) return;\n    const start = Math.min(dragStart.slot, dragCurrent.slot);\n    const end = Math.max(dragStart.slot, dragCurrent.slot);\n    document.querySelectorAll(`.slot-cell[data-day=\"${dragStart.day}\"]`).forEach(cell=>{\n      const s = Number(cell.dataset.slot);\n      if(s >= start && s <= end) cell.classList.add('selecting');\n    });\n    drawSelectionGhost(dragStart.day,start,end+1,'selection-ghost');\n  }\n  function paintPendingSelection(){\n    clearSelection();\n    if(!pendingSelection) return;\n    document.querySelectorAll(`.slot-cell[data-day=\"${pendingSelection.day}\"]`).forEach(cell=>{\n      const s = Number(cell.dataset.slot);\n      if(s >= pendingSelection.start && s < pendingSelection.end) cell.classList.add('pending');\n    });\n    drawSelectionGhost(pendingSelection.day,pendingSelection.start,pendingSelection.end,'selection-ghost pending-ghost');\n  }\n  function paintResizePreview(slot){\n    document.querySelectorAll('.slot-cell.resize-preview').forEach(c=>c.classList.remove('resize-preview'));\n    if(!slot) return;\n    document.querySelectorAll(`.slot-cell[data-day=\"${slot.day}\"]`).forEach(cell=>{\n      const s = Number(cell.dataset.slot);\n      if(s >= slot.start && s < slot.end) cell.classList.add('resize-preview');\n    });\n  }\n  function renderBlocks(){\n    document.querySelectorAll('.block').forEach(b=>b.remove());\n    document.querySelectorAll('.slot-cell.has-slot').forEach(c=>c.classList.remove('has-slot'));\n    displaySlots().forEach(slot=>{\n      const cell = slotCell(slot.day,slot.start);\n      if(!cell) return;\n      const block = document.createElement('div');\n      const isThirtyMinuteBlock = (slot.end - slot.start) === 1;\n      const isExpandedAssignment30 = slot.assignment && isThirtyMinuteBlock && expandedAssignment30Id === String(slot.id);\n      block.className = `block ${slot.fixed ? 'fixed ' : ''}${slot.assignment ? 'assignment ' : ''}${slot.centre === 'Online' ? 'online ' : ''}${isThirtyMinuteBlock ? 'is-30 ' : ''}${isExpandedAssignment30 ? 'expanded' : ''}`;\n      block.dataset.slotId = slot.id;\n      block.style.height = blockHeightFor(slot);\n      const isAvailabilityBlock = !slot.fixed && !slot.assignment;\n      const blockTitle = isAvailabilityBlock ? 'Available' : (slot.className || 'Available');\n      const displayBlockTitle = isThirtyMinuteBlock ? String(blockTitle).replace(/s*·s*/g, ' ') : blockTitle;\n      const blockSub = isThirtyMinuteBlock\n        ? `${isAvailabilityBlock ? '' : (slot.centre ? slot.centre + ' ' : '')}${slotToTime(slot.start)}-${slotToTime(slot.end)}`\n        : `${isAvailabilityBlock ? '' : (slot.centre ? slot.centre + ' · ' : '')}${slotToTime(slot.start)}-${slotToTime(slot.end)}`;\n      if(slot.assignment){\n        block.innerHTML = `<div class=\"centre\">${escapeHTML(displayBlockTitle)}</div><div class=\"time\">${escapeHTML(blockSub)}</div><button class=\"x\" title=\"Delete assignment\">×</button>`;\n      }else if(slot.fixed){\n        block.innerHTML = `<div class=\"centre\">${escapeHTML(displayBlockTitle)}</div><div class=\"time\">${escapeHTML(blockSub)}</div>`;\n      }else{\n        block.innerHTML = `<div class=\"resize-handle top\" title=\"Resize start\"></div><div class=\"centre\">${escapeHTML(displayBlockTitle)}</div><div class=\"time\">${escapeHTML(blockSub)}</div><button class=\"x\" title=\"Delete\">×</button><div class=\"resize-handle bottom\" title=\"Resize end\"></div>`;\n      }\n      block.addEventListener('pointerdown', e=>{\n        const handle = e.target.closest('.resize-handle');\n        if(handle && !slot.fixed){\n          e.preventDefault();\n          e.stopPropagation();\n          startResize(e, slot.id, handle.classList.contains('top') ? 'top' : 'bottom');\n          return;\n        }\n        e.stopPropagation();\n      });\n      block.addEventListener('click', e=>{\n        e.stopPropagation();\n        if(e.target.classList.contains('x')){\n          if(slot.assignment) deleteAssignmentSlot(slot);\n          else deleteSlot(slot.id);\n          return;\n        }\n        if(slot.assignment && (slot.end - slot.start) === 1){\n          expandedAssignment30Id = expandedAssignment30Id === String(slot.id) ? null : String(slot.id);\n          renderBlocks();\n        }\n      });\n      cell.appendChild(block);\n      for(let s=slot.start; s<slot.end; s++){\n        const covered = slotCell(slot.day,s);\n        if(covered) covered.classList.add('has-slot');\n      }\n    });\n  }\n  function renderSummary(){ }\n  function hasSelectedTeacher(){return teacherNames.includes(selectedTeacher)}\n  let renderRAF = null;\n  function syncBlockLayout(){\n    if(hasSelectedTeacher()) renderBlocks();\n  }\n  function queueBlockLayoutSync(){\n    if(renderRAF) cancelAnimationFrame(renderRAF);\n    renderRAF = requestAnimationFrame(()=>{\n      renderRAF = requestAnimationFrame(()=>{\n        renderRAF = null;\n        syncBlockLayout();\n      });\n    });\n  }\n  function render(){\n    updateWeekActions();\n    calendarWrap.classList.remove('hidden');\n    scheduleEmptyState.classList.add('hidden');\n    buildGrid();\n    if(hasSelectedTeacher()) renderBlocks();\n    queueBlockLayoutSync();\n  }\n  function updateWeekActions(){\n    if(weekDisplay){\n      weekDisplay.textContent = weekLabel();\n      weekDisplay.classList.toggle('current', weekOffset === 0);\n      weekDisplay.title = weekOffset === 0 ? 'Current week' : 'Back to current';\n    }\n  }\n  function mergeAvailableSlots(slots){\n    const clean = (slots || []).filter(s=>s && s.end > s.start).map(s=>({\n      id:s.id || Date.now()+Math.random(),\n      day:s.day,\n      start:s.start,\n      end:s.end,\n      centre:s.centre || ''\n    })).sort((a,b)=>a.day-b.day || String(a.centre || '').localeCompare(String(b.centre || '')) || a.start-b.start || a.end-b.end);\n    const merged = [];\n    clean.forEach(slot=>{\n      const last = merged[merged.length - 1];\n      if(last && last.day === slot.day && (last.centre || '') === (slot.centre || '') && last.end >= slot.start){\n        last.end = Math.max(last.end, slot.end);\n      }else{\n        merged.push({...slot, id:Date.now()+Math.random()});\n      }\n    });\n    return merged.sort((a,b)=>a.day-b.day || a.start-b.start || a.end-b.end);\n  }\n  function restoreAssignmentAsAvailability(slot){\n    if(Array.isArray(slot.originalAvailability) && slot.originalAvailability.length){\n      return slot.originalAvailability.map(s=>({\n        id:Date.now()+Math.random(),\n        day:s.day,\n        start:s.start,\n        end:s.end,\n        centre:s.centre || ''\n      })).filter
